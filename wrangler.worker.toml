name = "my-certcore"
main = "worker/index.js"
compatibility_date = "2026-05-12"
workers_dev = true
routes = [
  { pattern = "certcore.space/*", zone_name = "certcore.space" },
  { pattern = "www.certcore.space/*", zone_name = "certcore.space" }
]

[vars]
APP_ORIGIN = "https://certcore.space"
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "a0d8c71c354f49e3906c71ff5af32448"

[assets]
directory = "./out"
binding = "SITE_ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/",
  "/pricing",
  "/cyber-resilience-act-pdf",
  "/when-will-the-cyber-resilience-act-be-implemented",
  "/cyber-resilience-act-regulation",
  "/cyber-resilience-act-document",
  "/cyber-resilience-act-certification",
  "/cyber-resilience-act-wiki",
  "/cyber-resilience-act-logo",
  "/cyber-resilience-act-official-website",
  "/privacy",
  "/terms",
  "/checkout/done",
  "/sitemap.xml",
  "/robots.txt",
  "/BingSiteAuth.xml",
  "/api/*"
]
